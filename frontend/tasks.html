<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS PORTAL - Mini Project - Task Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: "#4f46e5" }, fontFamily: { sans: ["Inter", "sans-serif"] }, boxShadow: { 'card': '0px 2px 4px rgba(15,23,42,0.04),0px 4px 6px rgba(15,23,42,0.02)', 'floating': '0px 10px 15px -3px rgba(15,23,42,0.08),0px 4px 6px -4px rgba(15,23,42,0.04)' } } } }</script>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="flex h-screen overflow-hidden antialiased selection:bg-indigo-100 selection:text-indigo-900">

    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>

    <div class="flex-1 flex flex-col min-w-0 bg-slate-50 relative">
        <!-- Header Container -->
        <div id="header-container"></div>

        <main class="flex-1 overflow-auto p-4 md:p-6 lg:p-8 custom-scrollbar flex flex-col h-full">
            <div class="max-w-7xl mx-auto w-full flex-1 flex flex-col">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 shrink-0">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Project Board</h1>
                        <p class="text-sm text-slate-500 mt-1">Visualize team workflow and manage cross-department
                            operations.</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex -space-x-3 mr-4">
                            <img alt="A"
                                class="w-9 h-9 rounded-full border-2 border-slate-50 z-10 hover:scale-110 transition-transform shadow-sm"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuAlfxR8DcH7Va0wy6YmuUkjRm6Z1vfMAaajOKQX_PP48uR6uM3rbDzIC8fTWwWIpWw34LFK8HkCOsJnqGh4rO4fipHRcpe_7x7q68muopeApVl_dz23dX_Agdl3p1VArqeKxZvJXGTLJf4FDbHV1_yFoOhgx5RKecRKWWLNuaF0eqXpI3v3CVL8TOpKHS1risYgGUW3oq26fnlsMR2DXY-1am2GlRZOl2yWtfh3pew__Y32trOB76rlma3d6N9UiATq1BBcgea2a54" />
                            <img alt="B"
                                class="w-9 h-9 rounded-full border-2 border-slate-50 z-20 hover:scale-110 transition-transform shadow-sm"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYWlPwAsXa_a_J6vMfDfIPLiypSfWghjjMcaqcO_7vOGKTaTDNJuTz3j5Ibb9HZt109UkSd7JoaI8txVLdxlCT0wM2lFMNGbTLPeA6sTJxgxunHXFS4c-AAZ9zLPvSfqrPE-t9fn2Ms-HLl-GOqgkwnbfdRgzZvyGaC8FkgY4oWct0j_zIxrjhMgiwN1lMTKysCmSO2Ac-6t_pq8JfmqDK_MF72nyReAuvY-vyaJakUwdoVS_ZLX1FntpEuPTj0R5zsiGErnJF6dY" />
                            <div
                                class="w-9 h-9 rounded-full border-2 border-slate-50 bg-slate-100 flex items-center justify-center text-xs font-bold text-slate-500 z-40 cursor-pointer">
                                +12</div>
                        </div>
                        <button id="btn-new-task"
                            class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors shadow-sm">
                            <span class="material-symbols-outlined text-[18px]">add</span> New Task
                        </button>
                    </div>
                </div>

                <!-- Kanban Board -->
                <div class="flex gap-6 overflow-x-auto pb-4 custom-scrollbar flex-1 items-start min-h-[500px]">
                    <div class="w-80 flex-shrink-0 bg-slate-100/50 rounded-xl border border-slate-200 p-4 flex flex-col h-full max-h-full"
                        data-column="todo">
                        <div class="flex items-center justify-between mb-4 px-1">
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-slate-800">To Do</h3><span
                                    class="px-2 py-0.5 bg-slate-200 text-slate-600 rounded-md text-xs font-semibold">5</span>
                            </div>
                            <button class="text-slate-400 hover:text-slate-600"><span
                                    class="material-symbols-outlined text-[20px]">more_horiz</span></button>
                        </div>
                        <div id="col-todo" class="space-y-4 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
                    </div>
                    <div class="w-80 flex-shrink-0 bg-slate-100/50 rounded-xl border border-slate-200 p-4 flex flex-col h-full max-h-full"
                        data-column="in-progress">
                        <div class="flex items-center justify-between mb-4 px-1">
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-slate-800">In Progress</h3><span
                                    class="px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-md text-xs font-bold">3</span>
                            </div>
                            <button class="text-slate-400 hover:text-slate-600"><span
                                    class="material-symbols-outlined text-[20px]">more_horiz</span></button>
                        </div>
                        <div id="col-inprogress" class="space-y-4 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
                    </div>
                    <div class="w-80 flex-shrink-0 bg-slate-100/50 rounded-xl border border-slate-200 p-4 flex flex-col h-full max-h-full"
                        data-column="review">
                        <div class="flex items-center justify-between mb-4 px-1">
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-slate-800">Review</h3><span
                                    class="px-2 py-0.5 bg-amber-100 text-amber-700 rounded-md text-xs font-bold">2</span>
                            </div>
                            <button class="text-slate-400 hover:text-slate-600"><span
                                    class="material-symbols-outlined text-[20px]">more_horiz</span></button>
                        </div>
                        <div id="col-review" class="space-y-4 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
                    </div>
                    <div class="w-80 flex-shrink-0 bg-slate-100/50 rounded-xl border border-slate-200 p-4 flex flex-col h-full max-h-full opacity-80 hover:opacity-100 transition-opacity"
                        data-column="completed">
                        <div class="flex items-center justify-between mb-4 px-1">
                            <div class="flex items-center gap-2">
                                <h3 class="font-bold text-slate-800">Completed</h3><span
                                    class="px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded-md text-xs font-bold">18</span>
                            </div>
                            <button class="text-slate-400 hover:text-slate-600"><span
                                    class="material-symbols-outlined text-[20px]">more_horiz</span></button>
                        </div>
                        <div id="col-completed" class="space-y-4 overflow-y-auto custom-scrollbar flex-1 pr-1"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="components/ui.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => UI.init('Task Board'));
    </script>
    <script src="js/main.js"></script>
</body>

</html>
